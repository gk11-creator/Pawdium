<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PawRank — Submit</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<nav>
  <div class="logo">Paw<span>Rank</span><small>IU · 2025</small></div>
  <div class="nav-right">
    <a href="/"><button class="nav-tab">🏆 Rankings</button></a>
    <a href="/submit"><button class="nav-tab active">➕ Submit</button></a>
  </div>
</nav>

<div class="submit-wrap">

  <div class="banner banner-teal">
    <div class="banner-label">Add Your Pet</div>
    <div class="banner-title">➕ Submit to Leaderboard</div>
  </div>

  <!-- ADD ENTRY -->
  <div class="s-lbl">Submit Your Pet</div>
  <div class="form-card">
    <div class="row2">
      <div class="field">
        <label>Username</label>
        <input id="f-user" placeholder="e.g. jiwoo_kim"/>
      </div>
      <div class="field">
        <label>Pet Name</label>
        <input id="f-pet" placeholder="e.g. Bori"/>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Pet Type</label>
        <select id="f-type">
          <option>Dog</option>
          <option>Cat</option>
          <option>Rabbit</option>
          <option>Hamster</option>
          <option>Bird</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Score</label>
        <input id="f-score" type="number" placeholder="0–100" min="0" max="100"/>
      </div>
    </div>
    <div class="field">
      <label>Theme</label>
      <select id="f-theme">
        <option>Bravest Pet</option>
        <option>Best Outfit</option>
        <option>Best Matching Song</option>
        <option>Smartest Pet</option>
        <option>Cutest Pet</option>
        <option>Most Look-alike Owner</option>
        <option>Best Pose</option>
      </select>
    </div>
    <button class="submit-btn" onclick="submitEntry()">
      Submit to Leaderboard 🚀
    </button>
  </div>

  <!-- REMOVE ENTRY -->
  <div class="s-lbl">Remove Entry</div>
  <div class="form-card">
    <div class="field">
      <label>Username to Remove</label>
      <input id="r-user" placeholder="e.g. jiwoo_kim"/>
    </div>
    <button class="remove-btn" onclick="removeEntry()">Remove Entry</button>
  </div>

  <!-- API LOG -->
  <div class="s-lbl">API Response</div>
  <div class="api-log" id="add-log">No requests yet.</div>

</div>

<div class="toast" id="toast-el"></div>

<script src="/static/api.js"></script>
<script src="/static/submit.js"></script>
</body>
</html>
